<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WASL | وَصْل - الريادة في خدمات السيارات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #0a1128; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gold-text { color: #d4af37; }
        .navy-bg { background-color: #0a1128; }
    </style>
</head>
<body>

    <!-- الهيدر -->
    <nav class="fixed w-full z-50 p-6 flex justify-between items-center glass">
        <img src="logo.png" alt="WASL Logo" class="h-16"> <!-- ضع رابط شعارك هنا -->
        <ul class="hidden md:flex gap-8 font-bold">
            <li><a href="#" class="hover:text-yellow-500 transition">الرئيسية</a></li>
            <li><a href="#" class="hover:text-yellow-500 transition">خدماتنا</a></li>
            <li><a href="#" class="hover:text-yellow-500 transition">السيارات</a></li>
            <li><a href="#" class="hover:text-yellow-500 transition">تواصل معنا</a></li>
        </ul>
    </nav>

    <!-- قسم الفيديو -->
    <header class="relative h-screen flex items-center justify-center overflow-hidden">
        <video autoplay loop muted playsinline class="absolute w-full h-full object-cover">
            <source src="cars-doha.mp4" type="video/mp4"> <!-- ضع رابط فيديو الدوحة هنا -->
        </video>
        <div class="absolute inset-0 bg-[#0a1128]/70"></div>
        <div class="relative text-center z-10" data-aos="fade-up">
            <h1 class="text-6xl md:text-8xl font-bold mb-4">WASL | <span class="gold-text">وَصْل</span></h1>
            <p class="text-xl md:text-2xl mb-8">Connecting Opportunities. Creating Value.</p>
            <div class="flex gap-4 justify-center">
                <button class="bg-yellow-600 hover:bg-yellow-500 px-8 py-3 rounded-full transition">بيع سيارتك</button>
                <button class="border border-white hover:bg-white hover:text-navy px-8 py-3 rounded-full transition">تصفح السيارات</button>
            </div>
        </div>
    </header>

    <!-- قسم الخدمات -->
    <section class="py-20 px-10">
        <h2 class="text-4xl font-bold text-center mb-16 gold-text">خدماتنا الاحترافية</h2>
        <div class="grid md:grid-cols-4 gap-6">
            <!-- كارد خدمة -->
            <div class="glass p-8 rounded-2xl text-center hover:scale-105 transition duration-500">
                <div class="text-4xl mb-4 gold-text">🚗</div>
                <h3 class="text-xl font-bold">بيع السيارات</h3>
            </div>
            <div class="glass p-8 rounded-2xl text-center hover:scale-105 transition duration-500">
                <div class="text-4xl mb-4 gold-text">💰</div>
                <h3 class="text-xl font-bold">شراء السيارات</h3>
            </div>
            <div class="glass p-8 rounded-2xl text-center hover:scale-105 transition duration-500">
                <div class="text-4xl mb-4 gold-text">📈</div>
                <h3 class="text-xl font-bold">التسويق الاحترافي</h3>
            </div>
            <div class="glass p-8 rounded-2xl text-center hover:scale-105 transition duration-500">
                <div class="text-4xl mb-4 gold-text">🔍</div>
                <h3 class="text-xl font-bold">تقييم السيارة</h3>
            </div>
        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init();</script>
</body>
</html>
