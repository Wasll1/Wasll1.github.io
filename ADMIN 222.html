<!DOCTYPE html>
<html lang="ar" dir="rtl" data-lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تحكم وَصْل | إدارة السيارات</title>
<link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400..700&family=Tajawal:wght@400;500;700;900&family=Fraunces:opsz,wght@9..144,300..700&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>

<style>
  :root{
    --navy:#0D1B2A; --navy-deep:#070E16; --gold:#C8A45D; --gold-light:#E7CE97; --linen:#F4EFE4;
    --line: rgba(200,164,93,.25);
  }
  *{margin:0; padding:0; box-sizing:border-box;}
  body{
    background:var(--navy); color:var(--linen); font-family:'Tajawal',sans-serif;
    min-height:100vh; display:flex; flex-direction:column; -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;}
  html[data-lang="en"] body{font-family:'Manrope',sans-serif;}
  html[data-lang="en"] h1, html[data-lang="en"] h2, html[data-lang="en"] h3{font-family:'Fraunces',serif;}

  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 6vw; border-bottom:1px solid var(--line);
  }
  .topbar .brand{display:flex; align-items:center; gap:12px;}
  .topbar .brand img{height:32px; width:auto;}
  .topbar-actions{display:flex; align-items:center; gap:12px;}
  .lang-btn, .logout-btn{
    background:transparent; border:1px solid rgba(244,239,228,.3); color:var(--linen);
    padding:9px 18px; border-radius:2px; font-family:'Manrope',sans-serif; font-size:12.5px; font-weight:700;
    cursor:pointer; letter-spacing:.03em; transition:border-color .3s, background .3s;
  }
  .lang-btn:hover, .logout-btn:hover{border-color:var(--gold); background:rgba(200,164,93,.08);}

  .wrap{flex:1; padding:44px 6vw 90px; max-width:1080px; margin:0 auto; width:100%;}

  /* login */
  .login-screen{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px;
    position:relative;
  }
  .login-lang{position:absolute; top:24px; inset-inline-end:24px;}
  .login-logo{width:min(60vw,220px); margin-bottom:34px;}
  .login-card{
    width:100%; max-width:400px; background:linear-gradient(160deg, rgba(244,239,228,.07), rgba(244,239,228,.02));
    border:1px solid rgba(244,239,228,.14); border-radius:6px; padding:42px 34px;
  }
  .login-card h2{font-size:23px; color:#fff; margin-bottom:8px; font-weight:900; font-family:'Reem Kufi',sans-serif;}
  html[data-lang="en"] .login-card h2{font-family:'Fraunces',serif; font-weight:600;}
  .login-card p.sub{font-size:13.5px; color:rgba(244,239,228,.55); margin-bottom:30px;}

  .field{margin-bottom:19px;}
  .field label{display:block; font-size:13px; color:rgba(244,239,228,.6); margin-bottom:8px; font-weight:700;}
  .field input, .field textarea{
    width:100%; background:rgba(7,14,22,.5); border:1px solid rgba(244,239,228,.2);
    color:var(--linen); padding:13px 14px; border-radius:3px; font-family:inherit; font-size:14.5px;
    transition:border-color .3s;
  }
  .field input:focus, .field textarea:focus{outline:none; border-color:var(--gold);}
  .field input::placeholder, .field textarea::placeholder{color:rgba(244,239,228,.32);}

  .btn{
    width:100%; background:linear-gradient(135deg,var(--gold-light),var(--gold)); color:var(--navy-deep);
    font-weight:800; font-size:15px; padding:14px; border:none; border-radius:3px; cursor:pointer;
    font-family:'Manrope',sans-serif; transition:opacity .3s, transform .3s;
  }
  .btn:hover{opacity:.9; transform:translateY(-1px);}

  .error-msg{
    background:rgba(200,60,60,.15); border:1px solid rgba(200,60,60,.4); color:#ffb0b0;
    padding:11px 15px; border-radius:3px; font-size:13px; margin-bottom:18px; display:none;
  }
  .success-msg{
    background:rgba(60,180,120,.15); border:1px solid rgba(60,180,120,.4); color:#a6f0cf;
    padding:11px 15px; border-radius:3px; font-size:13px; margin-bottom:18px; display:none;
  }

  /* dashboard */
  .dashboard{display:none;}
  .panel{
    background:linear-gradient(160deg, rgba(244,239,228,.06), rgba(244,239,228,.015));
    border:1px solid rgba(244,239,228,.14); border-radius:6px; padding:32px; margin-bottom:28px;
  }
  .panel-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:24px;}
  .panel h3{font-size:17px; font-weight:900; color:#fff; font-family:'Reem Kufi',sans-serif;}
  html[data-lang="en"] .panel h3{font-family:'Fraunces',serif; font-weight:600;}
  .count-badge{
    background:rgba(200,164,93,.14); border:1px solid rgba(200,164,93,.35); color:var(--gold-light);
    font-size:12px; font-weight:800; padding:5px 13px; border-radius:20px; font-family:'Manrope',sans-serif;
  }

  .form-row{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
  .car-list{display:flex; flex-direction:column; gap:12px;}
  .car-row{
    display:flex; align-items:center; gap:16px; background:rgba(7,14,22,.4);
    border:1px solid rgba(244,239,228,.1); border-radius:4px; padding:12px 14px;
    transition:border-color .3s;
  }
  .car-row:hover{border-color:rgba(200,164,93,.3);}
  .car-row img{width:82px; height:60px; object-fit:cover; border-radius:3px; flex:none; background:#111;}
  .car-row .info{flex:1; min-width:0;}
  .car-row .info h4{font-size:14.5px; color:var(--linen); margin-bottom:4px; font-weight:700;}
  .car-row .info p{font-size:12.5px; color:rgba(244,239,228,.5);}
  .car-row .del-btn{
    background:transparent; border:1px solid rgba(255,120,120,.4); color:#ff9d9d;
    padding:9px 18px; border-radius:3px; font-family:'Manrope',sans-serif; font-size:12.5px; font-weight:700;
    cursor:pointer; flex:none; transition:background .3s;
  }
  .car-row .del-btn:hover{background:rgba(255,80,80,.12);}
  .empty-state{color:rgba(244,239,228,.4); font-size:14px; text-align:center; padding:36px 0;}
  .loader{color:rgba(244,239,228,.4); font-size:13px; text-align:center; padding:24px 0;}

  @media (max-width:640px){
    .form-row{grid-template-columns:1fr;}
    .topbar{padding:16px 5vw;}
    .wrap{padding:32px 5vw 60px;}
    .panel{padding:24px 20px;}
    .car-row img{width:64px; height:48px;}
  }
</style>
</head>

      <span style="font-family:'Reem Kufi',sans-serif; font-weight:700; font-size:15px; color:var(--gold-light);" data-i18n="topbar_title">لوحة التحكم</span>
    </div>
    <div class="topbar-actions">
      <button class="lang-btn" id="langBtn" type="button">EN</button>
      <button class="logout-btn" id="logoutBtn" data-i18n="logout_btn">تسجيل خروج</button>
    </div>
  </div>

  <div class="wrap">
    <div class="panel">
      <div class="panel-head">
        <h3 data-i18n="add_car_title">إضافة سيارة جديدة</h3>
      </div>
      <div class="success-msg" id="addSuccess" data-i18n="add_success">تمت إضافة السيارة بنجاح ✓</div>
      <div class="error-msg" id="addError"></div>
      <div class="form-row">
        <div class="field">
          <label data-i18n="car_name_label">اسم السيارة (يظهر في الموقع)</label>
          <input type="text" id="carName" data-i18n-ph="car_name_ph" placeholder="مثال: Range Rover Sport 2022">
        </div>
        <div class="field">
          <label data-i18n="car_price_label">السعر (اختياري)</label>
          <input type="text" id="carPrice" data-i18n-ph="car_price_ph" placeholder="مثال: 185,000 ر.ق">
        </div>
      </div>
      <div class="field">
        <label data-i18n="car_image_label">رابط الصورة (Image URL)</label>
        <input type="text" id="carImage" data-i18n-ph="car_image_ph" placeholder="https://... أو اسم-الملف.jpg إذا رفعتها على GitHub">
      </div>
      <div class="field">
        <label data-i18n="car_notes_label">ملاحظات إضافية (اختياري، للاستخدام الداخلي فقط)</label>
        <textarea id="carNotes" rows="2" data-i18n-ph="car_notes_ph" placeholder="موديل، سنة، حالة، إلخ"></textarea>
      </div>
      <button class="btn" id="addCarBtn" data-i18n="add_car_btn">إضافة السيارة للموقع</button>
    </div>

    <div class="panel">
      <div class="panel-head">
        <h3 data-i18n="current_cars_title">السيارات الحالية</h3>
        <span class="count-badge" id="carCount">0</span>
      </div>
      <div class="loader" id="carsLoader" data-i18n="loading_text">جاري التحميل...</div>
      <div class="car-list" id="carList"></div>
      <div class="empty-state" id="emptyState" style="display:none;" data-i18n="empty_state">لا توجد سيارات مضافة بعد — استخدم الفورم فوق لإضافة أول سيارة.</div>
    </div>
  </div>
</div>

<script>
  const translationsEn = {
    login_title: "Login",
    login_sub: "WASL Dashboard — Car Management",
    login_email_label: "Email",
    login_password_label: "Password",
    login_btn: "Log In",
    topbar_title: "Dashboard",
    logout_btn: "Log Out",
    add_car_title: "Add a New Car",
    add_success: "Car added successfully ✓",
    car_name_label: "Car Name (shown on site)",
    car_name_ph: "e.g. Range Rover Sport 2022",
    car_price_label: "Price (optional)",
    car_price_ph: "e.g. QAR 185,000",
    car_image_label: "Image URL",
    car_image_ph: "https://... or filename.jpg if uploaded to GitHub",
    car_notes_label: "Additional Notes (internal use only, optional)",
    car_notes_ph: "Model, year, condition, etc.",
    add_car_btn: "Add Car to Website",
    current_cars_title: "Current Cars",
    loading_text: "Loading...",
    empty_state: "No cars added yet — use the form above to add your first car."
  };
  const translationsPhEn = {
    car_name_ph: "e.g. Range Rover Sport 2022",
    car_price_ph: "e.g. QAR 185,000",
    car_image_ph: "https://... or filename.jpg if uploaded to GitHub",
    car_notes_ph: "Model, year, condition, etc."
  };

  let currentLang = 'ar';

  function applyLang(lang){
    document.documentElement.lang = lang;
    document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
    document.documentElement.setAttribute('data-lang', lang);

    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.dataset.i18n;
      if (lang === 'en' && translationsEn[key] !== undefined) {
        if (el.dataset.arOriginal === undefined) el.dataset.arOriginal = el.innerHTML;
        el.innerHTML = translationsEn[key];
      } else if (lang === 'ar' && el.dataset.arOriginal !== undefined) {
        el.innerHTML = el.dataset.arOriginal;
      }
    });

    document.querySelectorAll('[data-i18n-ph]').forEach(el => {
      const key = el.dataset.i18nPh;
      if (lang === 'en' && translationsPhEn[key] !== undefined) {
        if (el.dataset.arPh === undefined) el.dataset.arPh = el.placeholder;
        el.placeholder = translationsPhEn[key];
      } else if (lang === 'ar' && el.dataset.arPh !== undefined) {
        el.placeholder = el.dataset.arPh;
      }
    });

    const label = lang === 'ar' ? 'EN' : 'عربي';
    document.getElementById('langBtn').textContent = label;
    document.getElementById('langBtnLogin').textContent = label;
    currentLang = lang;
  }

  document.getElementById('langBtn').addEventListener('click', () => applyLang(currentLang === 'ar' ? 'en' : 'ar'));
  document.getElementById('langBtnLogin').addEventListener('click', () => applyLang(currentLang === 'ar' ? 'en' : 'ar'));

  const firebaseConfig = {
    apiKey: "AIzaSyAsI7EBIQLOkm9iGIOfW3UhNl1T77LAQeQ",
    authDomain: "wasll1-915b4.firebaseapp.com",
    databaseURL: "https://wasll1-915b4-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "wasll1-915b4",
    storageBucket: "wasll1-915b4.firebasestorage.app",
    messagingSenderId: "562274844589",
    appId: "1:562274844589:web:4e5cbc3d3f52cbf38aeb24"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.database();

  const loginScreen = document.getElementById('loginScreen');
  const dashboard = document.getElementById('dashboard');
  const loginError = document.getElementById('loginError');

  document.getElementById('loginBtn').addEventListener('click', () => {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    loginError.style.display = 'none';
    auth.signInWithEmailAndPassword(email, password).catch(() => {
      loginError.textContent = currentLang === 'ar' ? 'خطأ: تأكد من البريد وكلمة المرور' : 'Error: check your email and password';
      loginError.style.display = 'block';
    });
  });

  document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut());

  auth.onAuthStateChanged(user => {
    if (user) {
      loginScreen.style.display = 'none';
      dashboard.style.display = 'block';
      loadCars();
    } else {
      loginScreen.style.display = 'flex';
      dashboard.style.display = 'none';
    }
  });

  document.getElementById('addCarBtn').addEventListener('click', () => {
    const name = document.getElementById('carName').value.trim();
    const price = document.getElementById('carPrice').value.trim();
    const image = document.getElementById('carImage').value.trim();
    const notes = document.getElementById('carNotes').value.trim();
    const addError = document.getElementById('addError');
    const addSuccess = document.getElementById('addSuccess');
    addError.style.display = 'none';
    addSuccess.style.display = 'none';

    if (!name || !image) {
      addError.textContent = currentLang === 'ar' ? 'الاسم ورابط الصورة مطلوبين' : 'Name and image URL are required';
      addError.style.display = 'block';
      return;
    }

    db.ref('cars').push({
      name, price, image, notes,
      createdAt: Date.now()
    }).then(() => {
      addSuccess.style.display = 'block';
      document.getElementById('carName').value = '';
      document.getElementById('carPrice').value = '';
      document.getElementById('carImage').value = '';
      document.getElementById('carNotes').value = '';
      setTimeout(() => addSuccess.style.display = 'none', 2500);
    }).catch(() => {
      addError.textContent = currentLang === 'ar' ? 'حدث خطأ أثناء الإضافة، حاول مرة أخرى' : 'Something went wrong, please try again';
      addError.style.display = 'block';
    });
  });

  function loadCars() {
    const carList = document.getElementById('carList');
    const loader = document.getElementById('carsLoader');
    const emptyState = document.getElementById('emptyState');
    const carCount = document.getElementById('carCount');

    db.ref('cars').on('value', snapshot => {
      loader.style.display = 'none';
      const data = snapshot.val();
      carList.innerHTML = '';

      if (!data) {
        emptyState.style.display = 'block';
        carCount.textContent = '0';
        return;
      }
      emptyState.style.display = 'none';

      const entries = Object.entries(data).sort((a, b) => (b[1].createdAt || 0) - (a[1].createdAt || 0));
      carCount.textContent = String(entries.length);

      entries.forEach(([id, car]) => {
        const row = document.createElement('div');
        row.className = 'car-row';
        row.innerHTML = `
          <img src="${escapeHtml(car.image || '')}" alt="">
          <div class="info">
            <h4>${escapeHtml(car.name || '')}</h4>
            <p>${escapeHtml(car.price || '')}</p>
          </div>
          <button class="del-btn" data-id="${id}">${currentLang === 'ar' ? 'حذف' : 'Delete'}</button>
        `;
        carList.appendChild(row);
      });

      carList.querySelectorAll('.del-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const msg = currentLang === 'ar' ? 'متأكد إنك تبي تحذف هذي السيارة؟' : 'Are you sure you want to delete this car?';
          if (confirm(msg)) {
            db.ref('cars/' + btn.dataset.id).remove();
          }
        });
      });
    });
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }
</script>
</body>
</html>
